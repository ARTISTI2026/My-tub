<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="display:flex; justify-content:space-between; padding:10px; background:#fff; position:sticky; top:0; z-index:100;">
        <div style="color:red; font-weight:bold; font-size:20px;">YouTube</div>
        <div onclick="openSettings()" style="cursor:pointer; font-size:20px;">⚙️</div>
    </header>

    <div id="settings-panel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; padding:20px;">
        <button onclick="closeSettings()" style="background:red; color:white; border:none; padding:10px;">X Close</button>
        <h3>Owner Dashboard (Naina)</h3>
        <p>Owner Profit: <b id="owner-wallet" style="color:red;">₹0.00</b></p>
        <p>User Balance: <b id="user-wallet">₹0.00</b></p>
    </div>

    <main id="video-list" style="padding-bottom:80px;">
        <div class="video-card" onclick="NainaApp.heart.processUnlimitedProfit()">
            <div class="thumbnail" style="height:200px; background:url('https://picsum.photos/seed/naina/400/225') center/cover;"></div>
            <div style="padding:10px;"><b>Asli YouTube Algorithm Kaise Kaam Karta Hai?</b></div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="suraksha.js"></script>
    <script src="nasen.js"></script>
    <script src="pachan.js"></script>
    <script src="dharkan.js"></script>
    <script src="server.js"></script>
    <script src="brain.js"></script>

    <script>
        function openSettings() { document.getElementById('settings-panel').style.display = 'block'; }
        function closeSettings() { document.getElementById('settings-panel').style.display = 'none'; }
    </script>
</body>
</html>
