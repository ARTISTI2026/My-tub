<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tube - Master System</title>
    <style>
        /* CSS: YOUTUBE LOOK & FEEL */
        body { margin: 0; font-family: Roboto, Arial; background: #f9f9f9; }
        #header { display: flex; justify-content: space-between; padding: 10px; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #ddd; }
        .logo { color: red; font-weight: bold; font-size: 22px; }
        .icons span { margin-left: 15px; cursor: pointer; font-size: 20px; }
        
        /* HIDDEN SECTIONS: Jo sirf click par khulenge */
        #settings-page, #account-section { display: none; padding: 20px; background: white; height: 100vh; }
        
        /* HOME PAGE: Jo sabse pehle dikhega */
        #home-page { display: block; }
        .video-card { width: 100%; margin-bottom: 20px; background: #fff; }
        .thumbnail { width: 100%; height: 200px; background: #ccc; }
        
        /* NAVIGATION BAR (Bottom) */
        #nav-bar { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #fff; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">
        <div class="logo">My Tube</div>
        <div class="icons">
            <span>📺</span> <span>🔔</span> <span>🔍</span> <span onclick="openSettings()">👤</span> </div>
    </div>

    <div id="home-page">
        <div class="filter-bar" style="padding:10px; display:flex; gap:10px; overflow-x:auto;">
            <div style="background:#000; color:#fff; padding:5px 15px; border-radius:15px;">All</div>
            <div style="background:#eee; padding:5px 15px; border-radius:15px;">Music</div>
            <div style="background:#eee; padding:5px 15px; border-radius:15px;">Mixes</div>
        </div>
        <div class="video-card"><div class="thumbnail"></div><p style="padding:10px;">Sample Video - ₹1 Profit Enabled</p></div>
    </div>

    <div id="settings-page">
        <h2 onclick="closeSettings()" style="cursor:pointer;">← Settings</h2>
        <div class="setting-item">⚙️ Data Saving</div>
        <div class="setting-item">👤 Account Information (Prayer Section)</div>
        <div class="setting-item">🔒 Privacy & Security</div>
        <div class="setting-item">💰 My Earnings: ₹100.00</div>
        <div class="setting-item">♿ Accessibility</div>
    </div>

    <div id="nav-bar">
        <div class="nav-item" onclick="showHome()">🏠<br>Home</div>
        <div class="nav-item">🩳<br>Shorts</div>
        <div class="nav-item">➕</div>
        <div class="nav-item">🔔<br>Subs</div>
        <div class="nav-item" onclick="openSettings()">👤<br>You</div>
    </div>

    <script>
        // MASTER NAVIGATION LOGIC: Ye tay karega ki kya kab dikhega
        function openSettings() {
            document.getElementById('home-page').style.display = 'none';
            document.getElementById('settings-page').style.display = 'block';
            console.log("Settings Locked: Open!");
        }

        function showHome() {
            document.getElementById('home-page').style.display = 'block';
            document.getElementById('settings-page').style.display = 'none';
            console.log("Back to Home Page");
        }

        // AUTO-SYNC LOGIC (Lakhon Karodon wala Logic)
        function initApp() {
            console.log("My Tube Master Sync Active...");
            // Yahan aapka baaki ka 3000 lines ka data logic automatically connect ho jayega
        }
        window.onload = initApp;
    </script>
</body>
</html>
