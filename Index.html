
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-Tub Master Edition</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { background: #202020; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: #f00; font-size: 22px; font-weight: bold; flex: 1; }
        .search-container { padding: 10px; background: #121212; display: flex; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #333; color: #fff; }
        button.search-btn { padding: 10px 15px; border-radius: 20px; border: none; background: #f00; color: #fff; font-weight: bold; }
        #main-player { width: 100%; aspect-ratio: 16/9; background: #000; display: none; margin-top: 5px; }
        .shorts-container { display: flex; overflow-x: auto; gap: 10px; padding: 15px; }
        .short-card { min-width: 120px; height: 180px; background: #333; border-radius: 12px; position: relative; cursor: pointer; }
        .short-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; opacity: 0.6; }
        .short-title { position: absolute; bottom: 8px; left: 8px; font-size: 11px; font-weight: bold; }
        .download-btn { display: none; width: 90%; margin: 10px auto; padding: 12px; background: #ffd700; color: #000; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<header><div class="logo">My-Tub <span style="color:#fff; font-size:10px;">Master Edition</span></div></header>

<div class="search-container">
    <input type="text" id="search-input" placeholder="Video search karein...">
    <button class="search-btn" onclick="searchVideo()">Search</button>
</div>

<div id="main-player"></div>
<button id="dl-btn" class="download-btn" onclick="downloadAction()">📥 Download Video (HD)</button>

<h3 style="padding: 10px 15px 0; color: #ffd700; font-size: 16px;">⚡ Shorts (Touch to Play)</h3>
<div class="shorts-container">
    <div class="short-card" onclick="loadVideo('9bZkp7q19f0')"><img src="https://i.ibb.co/LzNf0zX/my-tub-logo.png"><div class="short-title">Trending #1</div></div>
    <div class="short-card" onclick="loadVideo('jOTfBlTrQ_Q')"><img src="https://i.ibb.co/LzNf0zX/my-tub-logo.png"><div class="short-title">Tech Magic</div></div>
    <div class="short-card" onclick="loadVideo('M7lc1UVf-VE')"><img src="https://i.ibb.co/LzNf0zX/my-tub-logo.png"><div class="short-title">AI Future</div></div>
</div>

<script>
function loadVideo(id) {
    const player = document.getElementById('main-player');
    const dlBtn = document.getElementById('dl-btn');
    player.style.display = 'block';
    dlBtn.style.display = 'block';
    player.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    window.scrollTo({top: 60, behavior: 'smooth'});
}

function searchVideo() {
    let q = document.getElementById('search-input').value;
    if(q) { window.open('https://www.youtube.com/results?search_query=' + q, '_blank'); }
}

function downloadAction() {
    alert("Master Artist: Download Link Taiyar Ho Raha Hai...");
}
</script>
</body>
</html>
