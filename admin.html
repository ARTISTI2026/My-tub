<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>MASTER CONTROL PANEL (V12)</title>
    <style>
        body { background: #0a0a0a; color: #ffd700; font-family: 'Courier New', monospace; padding: 20px; }
        .panel-box { border: 2px solid #ffd700; padding: 20px; border-radius: 10px; background: #111; }
        h1 { text-align: center; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { background: #222; padding: 15px; border-radius: 5px; border-left: 5px solid #f00; }
        .btn { background: #f00; color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; }
    </style>
</head>
<body>

<div class="panel-box">
    <h1>MASTER ADMIN CONTROL</h1>
    <p style="text-align:center; color:#0f0;">🛡️ Suraksha Guard: ONLINE</p>

    <div class="stat-grid">
        <div class="stat-card">
            <h3>💰 Total Earning</h3>
            <p id="money">$0.00</p>
        </div>
        <div class="stat-card" style="border-left-color: #0f0;">
            <h3>👥 Active Users</h3>
            <p id="users">1 (Master)</p>
        </div>
    </div>

    <hr style="border:0.5px solid #333; margin:20px 0;">

    <h3>🚀 Push New Video (Master Link)</h3>
    <input type="text" id="vidId" placeholder="YouTube Video ID (Example: jOTfB1TrQ_Q)">
    <button class="btn" onclick="updateApp()">PUBLISH TO MY-TUB</button>

    <br><br>
    <button class="btn" style="background:#444;" onclick="alert('AI Cleaning Started...')">🧹 DEEP CLEAN APP</button>
</div>

<script>
    function updateApp() {
        let id = document.getElementById('vidId').value;
        if(id) {
            alert("Video " + id + " has been pushed to Master Feed via AI!");
        } else {
            alert("Please enter a Video ID");
        }
    }
    
    // Automatic Earning Update Logic
    setInterval(() => {
        let current = parseFloat(document.getElementById('money').innerText.replace('$', ''));
        document.getElementById('money').innerText = "$" + (current + 0.05).toFixed(2);
    }, 5000);
</script>

</body>
</html>
