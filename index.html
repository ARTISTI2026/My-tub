<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-Tub Final</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo"><img src="1000041495.jpg" alt="Logo"><span>My-Tub</span></div>
        <div class="top-icons">
            <i class="fas fa-tv" onclick="openPanel('tv-panel')"></i>
            <i class="fas fa-bell" onclick="openPanel('notif-panel')"></i>
            <i class="fas fa-search" onclick="openSearch()"></i>
            <div class="user-pfp" onclick="openPanel('account-panel')">N</div>
        </div>
    </header>

    <main id="video-feed"></main>

    <div id="panel-container"></div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="location.reload()"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="openExplore()"><i class="fas fa-compass"></i><span>Explore</span></div>
        <div class="nav-item plus"><i class="fas fa-plus-circle"></i></div>
        <div class="nav-item" onclick="openPanel('subs-panel')"><i class="fas fa-layer-group"></i><span>Subs</span></div>
        <div class="nav-item" onclick="openPanel('account-panel')"><i class="fas fa-user-circle"></i><span>You</span></div>
    </nav>

    <script src="brain.js"></script>
</body>
</html>
