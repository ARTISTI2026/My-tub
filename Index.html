
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-tub | Artist Skill Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; }
        .video-card:hover { transform: scale(1.03); transition: 0.3s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <nav class="flex items-center justify-between px-4 py-2 sticky top-0 bg-[#0f0f0f] z-50 border-b border-gray-800">
        <div class="flex items-center gap-4 text-2xl font-bold text-red-600">
            <i class="fab fa-youtube"></i> <span class="text-white">My-tub</span>
        </div>
        <div class="hidden md:flex flex-1 max-w-[600px] mx-10 text-sm">
            <input type="text" placeholder="Search My-tub..." class="w-full bg-[#121212] border border-gray-700 px-4 py-2 rounded-l-full outline-none focus:border-blue-500">
            <button class="bg-[#222222] px-6 py-2 rounded-r-full border border-gray-700 border-l-0"><i class="fa fa-search text-gray-400"></i></button>
        </div>
        <div class="flex items-center gap-4 text-xl">
            <i class="fa fa-video"></i> <i class="fa fa-bell"></i>
            <div class="w-8 h-8 bg-purple-600 rounded-full flex items-center justify-center text-sm">AS</div>
        </div>
    </nav>

    <main class="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div class="video-card cursor-pointer">
            <div class="aspect-video bg-gray-800 rounded-xl overflow-hidden mb-3">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="flex gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-full flex-shrink-0"></div>
                <div>
                    <h3 class="font-bold text-sm mb-1 leading-tight">Mastering Artist Skill: Engraving Pro</h3>
                    <p class="text-gray-400 text-xs">My-tub Owner • 1M views • 1 day ago</p>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-5 right-5 z-[100]">
        <button onclick="openWallet()" class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-3 px-6 rounded-full shadow-2xl flex items-center gap-2 transition-transform active:scale-95">
            <i class="fas fa-wallet"></i> My Wallet: ₹500
        </button>
    </div>

    <div id="walletModal" class="fixed inset-0 bg-black bg-opacity-90 hidden items-center justify-center z-[200] p-4">
        <div class="bg-[#1a1a1a] border border-gray-700 p-6 rounded-2xl max-w-sm w-full shadow-2xl text-center">
            <h2 class="text-xl font-bold text-yellow-500 mb-4 flex items-center justify-center gap-2">
                <i class="fas fa-university"></i> Withdraw Money
            </h2>
            <p class="text-gray-400 text-sm mb-4">Paisa nikalne ke liye Bank Details bhariye:</p>
            <input type="text" id="bName" placeholder="Bank Name" class="w-full bg-[#121212] border border-gray-700 p-2 rounded mb-3 outline-none focus:border-yellow-500">
            <input type="text" id="aNum" placeholder="Account Number" class="w-full bg-[#121212] border border-gray-700 p-2 rounded mb-3 outline-none focus:border-yellow-500">
            <input type="text" id="ifsc" placeholder="IFSC Code" class="w-full bg-[#121212] border border-gray-700 p-2 rounded mb-4 outline-none focus:border-yellow-500">
            <div class="flex gap-2">
                <button onclick="closeWallet()" class="flex-1 bg-gray-700 py-2 rounded font-bold">Cancel</button>
                <button onclick="saveBank()" class="flex-1 bg-green-600 py-2 rounded font-bold">Transfer Now</button>
            </div>
        </div>
    </div>

    <footer class="mt-10 p-10 border-t border-gray-800 text-center">
        <h2 class="text-xl font-bold text-yellow-500 mb-2 italic text-sm">ENGRAVING EXPERT SKILL</h2>
        <p class="text-gray-400 text-xs">© 2026 My-tub - Created by Artist</p>
    </footer>

    <script>
        function openWallet() { document.getElementById('walletModal').style.display = 'flex'; }
        function closeWallet() { document.getElementById('walletModal').style.display = 'none'; }
        function saveBank() {
            alert('Bank Details Saved! Paisa aapke account mein 24 ghante mein aa jayega.');
            closeWallet();
        }
    </script>
</body>
</html>
