<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V12 Master - MyTub Edition</title>
    <style>
        body { background: #000; color: white; font-family: Roboto, Arial; margin: 0; padding-bottom: 80px; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #000; position: sticky; top: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 20px; }
        .v-card { margin-bottom: 20px; width: 100%; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #222; object-fit: cover; }
        .v-details { padding: 12px; display: flex; gap: 12px; }
        .pfp { width: 40px; height: 40px; background: #555; border-radius: 50%; flex-shrink: 0; }
        .v-info { flex-grow: 1; }
        .v-title { font-size: 16px; font-weight: 500; margin: 0 0 5px 0; }
        .v-meta { font-size: 12px; color: #aaa; }
        .sub-btn { background: white; color: black; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; border: none; float: right; margin-top: -30px; }
        
        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; z-index: 2000; }
        .nav-item { text-align: center; font-size: 10px; color: white; cursor: pointer; }
        
        /* Player Overlay */
        #player-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:5000; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <span style="color:red; font-size:24px;">▲</span> My<span style="background:red; padding:2px 5px; border-radius:4px;">Tub</span>
        <span style="font-size:10px; color:gold; margin-left:5px;">V12 MASTER</span>
    </div>
    <div style="display:flex; gap:15px; font-size:20px;">
        <span onclick="alert('Search Active')">🔍</span>
        <span onclick="toggleSettings()" style="cursor:pointer;">⚙️</span>
    </div>
</header>

<div id="mainFeed">
    <div class="v-card" onclick="openVideo('jOTfB1TrQ_Q')">
        <img class="thumb" src="https://img.youtube.com/vi/jOTfB1TrQ_Q/maxresdefault.jpg">
        <div class="v-details">
            <div class="pfp"></div>
            <div class="v-info">
                <p class="v-title">6-Foot Robotic Unit: The Manufacturing Revolution</p>
                <p class="v-meta">Master Engineering • 4.1M views • 2 days ago</p>
                <button class="sub-btn">Subscribe</button>
            </div>
        </div>
    </div>

    <div class="v-card" onclick="openVideo('9bZkp7q19f0')">
        <img class="thumb" src="https://img.youtube.com/vi/9bZkp7q19f0/maxresdefault.jpg">
        <div class="v-details">
            <div class="pfp" style="background:url('https://yt3.ggpht.com/ytc/AIdro_nO...')"></div>
            <div class="v-info">
                <p class="v-title">Adobe Express AI: High-End Graphic Secrets</p>
                <p class="v-meta">Design Expert • 1.5M views • 1 month ago</p>
                <button class="sub-btn">Subscribe</button>
            </div>
        </div>
    </div>
</div>

<div id="player-overlay">
    <span onclick="closePlayer()" style="position:absolute; top:20px; right:20px; font-size:30px;">×</span>
    <div id="video-frame" style="width:100%; height:300px; margin-top:100px;"></div>
</div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="location.reload()">🏠<br>Home</div>
    <div class="nav-item">🩳<br>Shorts</div>
    <div class="nav-item" style="font-size:24px;">⊕</div>
    <div class="nav-item">🔔<br>Subs</div>
    <div class="nav-item" onclick="toggleSettings()">👤<br>You</div>
</nav>

<script>
    function openVideo(id) {
        document.getElementById('player-overlay').style.display = 'block';
        document.getElementById('video-frame').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
    }
    function closePlayer() {
        document.getElementById('player-overlay').style.display = 'none';
        document.getElementById('video-frame').innerHTML = '';
    }
    function toggleSettings() {
        alert("Wallet & Settings Unlocked! Earnings: ₹1 tracked.");
    }
</script>

</body>
</html>
