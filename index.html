<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTub V12 Master - Full Control</title>
    <style>
        * { box-sizing: border-box; }
        body { background: #0f0f0f; color: white; font-family: Roboto, Arial; margin: 0; padding-bottom: 70px; }
        
        /* 1. TOP HEADER ICONS */
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: #0f0f0f; position: sticky; top: 0; z-index: 1000; }
        .head-icons { display: flex; gap: 18px; align-items: center; }
        .icon { font-size: 20px; cursor: pointer; color: white; }

        /* 2. VIDEO LISTING */
        .video-box { width: 100%; margin-bottom: 10px; }
        .poster { width: 100%; aspect-ratio: 16/9; background: #222; }
        .v-meta-row { display: flex; padding: 10px; gap: 12px; }
        .chan-img { width: 36px; height: 36px; border-radius: 50%; background: #444; }
        .v-text { flex: 1; }
        .v-text h4 { margin: 0; font-size: 14px; font-weight: 500; }
        .v-text p { margin: 4px 0; font-size: 12px; color: #aaa; }

        /* 3. SHORTS SECTION (Full Screen) */
        #shortsOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; }
        .short-vid { width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; }

        /* 4. BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #0f0f0f; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; z-index: 3000; }
        .nav-btn { text-align: center; font-size: 10px; color: white; cursor: pointer; }
        .nav-btn span { font-size: 20px; display: block; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; font-size:20px;"><span style="color:red;">▶</span> MyTub</div>
    <div class="head-icons">
        <span class="icon" onclick="alert('Connecting to TV...')">📺</span> <span class="icon" onclick="alert('No new notifications')">🔔</span> <span class="icon">🔍</span> <span class="icon" onclick="openMenu()">⋮</span> </div>
</header>

<div id="feed">
    <div class="video-box" onclick="playVid('jOTfB1TrQ_Q')">
        <img class="poster" src="https://img.youtube.com/vi/jOTfB1TrQ_Q/maxresdefault.jpg">
        <div class="v-meta-row">
            <div class="chan-img"></div>
            <div class="v-text">
                <h4>6-Foot Humanoid Robot: Building the Future of AI</h4>
                <p>Naina Tech • 8.5M views • 2 hours ago</p>
                <button style="background:white; color:black; border:none; border-radius:15px; padding:5px 10px; font-size:11px; font-weight:bold;">Subscribe</button>
            </div>
        </div>
    </div>
</div>

<div id="shortsOverlay">
    <div class="short-vid">
        <h2 style="color:red;">🔥 SHORTS MODE ACTIVE</h2>
        <p style="position:absolute; bottom:100px;">Swipe up for next short...</p>
        <button onclick="closeShorts()" style="position:absolute; top:20px; right:20px; background:none; color:white; border:none; font-size:30px;">×</button>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-btn" onclick="location.reload()"><span>🏠</span>Home</div>
    <div class="nav-btn" onclick="openShorts()"><span>🩳</span>Shorts</div>
    <div class="nav-btn"><span style="font-size:30px; color:red;">⊕</span></div>
    <div class="nav-btn" onclick="alert('Your Subscriptions are empty')"><span>🔔</span>Subs</div>
    <div class="nav-btn" onclick="openMenu()"><span>👤</span>You</div>
</nav>

<div id="masterMenu" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:4000; padding:20px;">
    <h2 style="border-bottom:1px solid #333; padding-bottom:10px;">Settings & You</h2>
    <div onclick="alert('Wallet Balance: ₹9.00 Master Profit')" style="padding:15px; background:#222; margin-bottom:10px; border-radius:10px;">💰 My Wallet (Earnings)</div>
    <div style="padding:15px; background:#111; margin-bottom:10px; border-radius:10px;">📥 Downloads</div>
    <div style="padding:15px; background:#111; margin-bottom:10px; border-radius:10px;">🕒 History</div>
    <button onclick="closeMenu()" style="width:100%; padding:15px; background:red; color:white; border:none; margin-top:20px;">Piche Jayein</button>
</div>

<script>
    function openShorts() { document.getElementById('shortsOverlay').style.display = 'block'; }
    function closeShorts() { document.getElementById('shortsOverlay').style.display = 'none'; }
    function openMenu() { document.getElementById('masterMenu').style.display = 'block'; }
    function closeMenu() { document.getElementById('masterMenu').style.display = 'none'; }
    
    function playVid(id) {
        alert("Video loading... Tracking ₹9 profit for Master Naina.");
        window.open('https://www.youtube.com/watch?v='+id, '_blank');
    }
</script>

</body>
</html>
