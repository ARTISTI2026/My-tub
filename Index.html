<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My-Tub</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #202020; padding: 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { color: #f00; font-size: 24px; font-weight: bold; }
        
        /* Shorts Style */
        .shorts-container { display: flex; overflow-x: auto; gap: 10px; padding: 15px; }
        .short-card { min-width: 140px; height: 220px; background: #333; border-radius: 12px; position: relative; border: 1px solid #ffd70033; }
        .short-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; opacity: 0.7; }
        .short-title { position: absolute; bottom: 10px; left: 10px; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        /* Full Video Style */
        .video-feed { padding: 10px; }
        .video-card { background: #151515; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
        .thumbnail { width: 100%; height: 200px; background: #222; position: relative; }
        .video-info { padding: 12px; display: flex; gap: 12px; }
        .channel-icon { width: 40px; height: 40px; background: #ffd700; border-radius: 50%; flex-shrink: 0; }
        .details h4 { margin: 0; font-size: 16px; color: #fff; }
        .details p { margin: 5px 0 0; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>

<header>
    <div class="logo">My-Tub <span style="color:#fff; font-size:12px;">Master Edition</span></div>
</header>

<h3 style="padding: 10px 15px 0; color: #ffd700;">⚡ Shorts</h3>
<div class="shorts-container">
    <div class="short-card"><img src="https://i.ibb.co/LzNf0zX/my-tub-logo.png"><div class="short-title">Artist Skill #1</div></div>
    <div class="short-card"><img src="https://i.ibb.co/LzNf0zX/my-tub-logo.png"><div class="short-title">Magic Engraving</div></div>
    <div class="short-card"><img src="https://i.ibb.co/LzNf0zX/my-tub-logo.png"><div class="short-title">Master Class</div></div>
</div>

<h3 style="padding: 10px 15px 0; color: #fff;">📺 Home Feed</h3>
<div class="video-feed">
    <div class="video-card">
        <div class="thumbnail" style="background: url('https://i.ibb.co/LzNf0zX/my-tub-logo.png') center/cover;"></div>
        <div class="video-info">
            <div class="channel-icon"></div>
            <div class="details">
                <h4>Asli Artist ki Pehchan | YouTube Edition</h4>
                <p>Master Artist • 5.2M Views • 2 hours ago</p>
            </div>
        </div>
    </div>
    <div class="video-card">
        <div class="thumbnail" style="background: url('https://i.ibb.co/LzNf0zX/my-tub-logo.png') center/cover;"></div>
        <div class="video-info">
            <div class="channel-icon" style="background:#ff0000;"></div>
            <div class="details">
                <h4>How to Build Your Own App in 2026</h4>
                <p>Tech Guru • 1.1M Views • 1 day ago</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
